# Mosquitto MQTT Broker Configuration for NEMO Tool Display
# Auto-generated by setup.sh

# General settings
persistence true
persistence_location /Users/adenton/Desktop/NEMO-Tool-Display/vm_server/mqtt/data/
log_dest file /Users/adenton/Desktop/NEMO-Tool-Display/vm_server/mqtt/log/mosquitto.log
log_type error
log_type warning
log_type notice
log_type information

# Broker authentication (hashed credentials in password file)
allow_anonymous false
password_file /Users/adenton/Desktop/NEMO-Tool-Display/vm_server/mqtt/config/passwd

# Network settings - ESP32 displays
listener 1883 0.0.0.0
protocol mqtt

# Network settings - NEMO backend
